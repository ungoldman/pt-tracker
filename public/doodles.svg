<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 700" width="560" height="700">
  <!-- Exercise doodle wallpaper tile, WhatsApp chat-background style:
       dense scatter, three size tiers (scale 1.35 / 1 / 0.7) plus micro
       fillers (dots, sparkles, squiggles) tucked into the gaps. Tone-on-tone
       strokes read against both the dark and light app bases. -->
  <g fill="none" stroke="#828282" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.18">

    <!-- ===== row 1 ===== -->
    <g transform="translate(50 52) rotate(-12) scale(1.35)">
      <path d="M-14 -7 v14 M-9 -10 v20 M9 -10 v20 M14 -7 v14 M-9 0 h18"/>
    </g><!-- dumbbell L -->
    <g transform="translate(172 60) rotate(8)">
      <rect x="-10" y="-4" width="15" height="13" rx="3"/>
      <path d="M5 -2 a4.5 4.5 0 0 1 0 9"/>
      <path d="M-6 -9 q2 -3 0 -6 M1 -9 q2 -3 0 -6"/>
    </g><!-- mug M -->
    <g transform="translate(282 48) rotate(15) scale(0.7)">
      <path d="M0 -9 L2 -2 L9 0 L2 2 L0 9 L-2 2 L-9 0 L-2 -2 Z"/>
    </g><!-- sparkle S -->
    <g transform="translate(388 58) rotate(-6) scale(1.35)">
      <path d="M-12 -2 h24"/>
      <path d="M-12 -2 a12 11 0 0 0 24 0"/>
      <path d="M5 -14 l7 7"/>
      <circle cx="3.5" cy="-15.5" r="2.5"/>
      <path d="M17 -8 q3 4 0 8"/>
    </g><!-- bowl L -->
    <g transform="translate(508 52) rotate(10)">
      <circle cx="-14" cy="-7" r="3.5"/>
      <circle cx="14" cy="7" r="3.5"/>
      <path d="M-11 -5 C -4 1 4 -1 11 5"/>
    </g><!-- band M -->

    <!-- ===== row 2 ===== -->
    <g transform="translate(60 170) rotate(7)">
      <path d="M0 9 C -11 2 -10 -8 -4 -8 C -1 -8 0 -5 0 -5 C 0 -5 1 -8 4 -8 C 10 -8 11 2 0 9 Z"/>
      <path d="M-8 -1 h4 l2 -4 l3 7 l2 -3 h4"/>
    </g><!-- heart M -->
    <g transform="translate(170 178) rotate(-8) scale(0.7)">
      <path d="M-9 -9 h8 l-8 8 h8"/>
      <path d="M3 -2 h6 l-6 6 h6"/>
    </g><!-- zzz S -->
    <g transform="translate(284 168) rotate(-9) scale(1.35)">
      <path d="M-15 5 q-1 -9 6 -9 q5 0 8 5 q3 4 8 4 h7 q2 5 -3 5 h-24 q-2 0 -2 -5"/>
      <path d="M-5 -2 l3 3 M-1 -4 l3 3"/>
    </g><!-- shoe L -->
    <g transform="translate(396 176) rotate(12) scale(0.7)">
      <path d="M1 1 q5 -1 4 -6 q-1 -7 -9 -6 q-10 1 -9 11 q1 12 14 11"/>
    </g><!-- spiral S -->
    <g transform="translate(500 166) rotate(-7)">
      <circle cx="0" cy="2" r="11"/>
      <path d="M0 2 v-6 M0 -13 v4 M-4 -13 h8 M9 -9 l3 -3"/>
    </g><!-- stopwatch M -->

    <!-- ===== row 3 ===== -->
    <g transform="translate(52 290) rotate(10) scale(0.7)">
      <path d="M2 -11 l-9 12 h6 l-3 10 l10 -13 h-6 z"/>
    </g><!-- lightning S -->
    <g transform="translate(166 284) rotate(6) scale(1.35)">
      <circle cy="4" r="9.5"/>
      <path d="M-5.5 -3 a 7 7 0 0 1 11 0"/>
    </g><!-- kettlebell L -->
    <g transform="translate(278 296) rotate(-11)">
      <ellipse cx="-6" cy="-2" rx="3.5" ry="6"/>
      <circle cx="-6" cy="-10.5" r="1.7"/>
      <ellipse cx="6" cy="7" rx="3.5" ry="6"/>
      <circle cx="6" cy="-1.5" r="1.7"/>
    </g><!-- footprints M -->
    <g transform="translate(392 286) rotate(5)">
      <rect x="-5" y="-7" width="10" height="19" rx="3"/>
      <path d="M-3 -7 v-4 h6 v4 M-5 1 h10"/>
    </g><!-- bottle M -->
    <g transform="translate(506 292) rotate(-8) scale(1.35)">
      <path d="M-11 11 q-1 -13 7 -15 l1 -5 q0 -2 2 -2 l4 1 q2 1 1 3 l-1 5 q8 3 7 13"/>
      <circle cx="3" cy="-9" r="2.2"/>
    </g><!-- bicep L -->

    <!-- ===== row 4 ===== -->
    <g transform="translate(58 408) rotate(-10)">
      <ellipse cx="-10" cy="0" rx="4" ry="8"/>
      <path d="M-10 -8 h20 a4 8 0 0 1 0 16 h-20"/>
    </g><!-- roller M -->
    <g transform="translate(172 400) rotate(7)">
      <circle r="6"/>
      <path d="M0 -13 v4 M0 9 v4 M-13 0 h4 M9 0 h4 M-9 -9 l2.5 2.5 M6.5 6.5 l2.5 2.5 M-9 9 l2.5 -2.5 M6.5 -6.5 l2.5 -2.5"/>
    </g><!-- sun M -->
    <g transform="translate(286 412) rotate(-5) scale(0.7)">
      <circle r="9"/>
      <path d="M-4 0 l3 3 l6 -7"/>
    </g><!-- check S -->
    <g transform="translate(398 402) rotate(9) scale(1.35)">
      <path d="M-7 -11 h14 v6 a7 7 0 0 1 -14 0 z"/>
      <path d="M-7 -9 q-5 0 -4 5 q1 4 4 3 M7 -9 q5 0 4 5 q-1 4 -4 3"/>
      <path d="M0 2 v5 M-5 11 h10 M-3 7.5 h6"/>
    </g><!-- trophy L -->
    <g transform="translate(508 410) rotate(-6)">
      <circle r="8"/>
      <path d="M-12 -3 q-2 3 0 6 M12 -3 q2 3 0 6"/>
    </g><!-- stress ball M -->

    <!-- ===== row 5 ===== -->
    <g transform="translate(54 524) rotate(-9)">
      <path d="M-13 13 L13 -13 M-11 6 l5 5 M6 -11 l5 5"/>
    </g><!-- dowel M -->
    <g transform="translate(168 530) rotate(12) scale(0.7)">
      <path d="M-10 -4 q0 12 13 12 q5 0 7 -3 q-4 1 -8 0 q-10 -2 -9 -9 z"/>
      <path d="M-10 -4 l-1.5 -3.5"/>
    </g><!-- banana S -->
    <g transform="translate(280 520) rotate(-7) scale(1.35)">
      <path d="M3 -11 a11 11 0 1 0 7 17 a9 9 0 0 1 -7 -17"/>
      <path d="M11 -4 v6 M8 -1 h6"/>
    </g><!-- moon L -->
    <g transform="translate(394 528) rotate(8)">
      <path d="M-10 -12 h14 q4 0 4 4 v16 M-10 -12 v20 q0 4 4 4 h13"/>
    </g><!-- towel M -->
    <g transform="translate(506 522) rotate(-10) scale(0.7)">
      <path d="M-6 -10 h12 M-6 10 h12 M-5 -10 q0 7 5 10 q-5 3 -5 10 M5 -10 q0 7 -5 10 q5 3 5 10"/>
    </g><!-- hourglass S -->

    <!-- ===== row 6 ===== -->
    <g transform="translate(60 640) rotate(6)">
      <circle r="7"/>
      <path d="M0 0 q4 0 4 -4"/>
      <path d="M-13 10 h26"/>
    </g><!-- mat M -->
    <g transform="translate(174 646) rotate(-5) scale(1.35)">
      <circle r="10"/>
      <circle r="5.5"/>
      <circle r="1.4"/>
    </g><!-- target L -->
    <g transform="translate(286 636) rotate(9)">
      <path d="M-12 -6 q-5 14 9 16 q14 2 16 -12"/>
      <path d="M-12 -6 l-2 -6 M13 -2 l3 -6"/>
    </g><!-- jump rope M -->
    <g transform="translate(398 644) rotate(-12) scale(0.7)">
      <path d="M-8 -8 l3 3 M7 -10 l2 4 M-10 5 l4 2 M8 8 l-3 -3"/>
      <circle cx="0" cy="-2" r="1.7"/>
      <circle cx="10" cy="0" r="1.7"/>
      <circle cx="-6" cy="-13" r="1.7"/>
    </g><!-- confetti S -->
    <g transform="translate(504 640) rotate(7)">
      <path d="M-10 -6 q4 -3 8 0 t8 0 M-10 0 q4 -3 8 0 t8 0 M-10 6 q4 -3 8 0 t8 0"/>
    </g><!-- breath waves M -->

    <!-- ===== micro fillers ===== -->
    <circle cx="112" cy="112" r="2" fill="#828282" stroke="none"/>
    <g transform="translate(225 105) rotate(12)"><path d="M-7 0 q2 -4 4 0 t4 0 t4 0"/></g>
    <circle cx="338" cy="118" r="3.5"/>
    <g transform="translate(452 110)"><path d="M0 -5 v10 M-5 0 h10"/></g>
    <g transform="translate(20 225)"><path d="M0 -4 L1.5 0 L0 4 L-1.5 0 Z"/></g>
    <g transform="translate(115 232) rotate(20)"><path d="M-3 -3 l6 6 M3 -3 l-6 6"/></g>
    <circle cx="230" cy="238" r="2" fill="#828282" stroke="none"/>
    <g transform="translate(340 228) rotate(15)"><path d="M0 -5 v10 M-5 0 h10"/></g>
    <g transform="translate(455 235) rotate(-14)"><path d="M-7 0 q2 -4 4 0 t4 0 t4 0"/></g>
    <circle cx="543" cy="225" r="3.5"/>
    <g transform="translate(25 350) rotate(8)"><path d="M-7 0 q2 -4 4 0 t4 0 t4 0"/></g>
    <g transform="translate(112 346)"><path d="M0 -5 v10 M-5 0 h10"/></g>
    <circle cx="225" cy="352" r="2" fill="#828282" stroke="none"/>
    <g transform="translate(336 344)"><path d="M0 -4 L1.5 0 L0 4 L-1.5 0 Z"/></g>
    <circle cx="450" cy="352" r="3.5"/>
    <circle cx="540" cy="348" r="2" fill="#828282" stroke="none"/>
    <circle cx="115" cy="468" r="3.5"/>
    <g transform="translate(228 462) rotate(10)"><path d="M0 -5 v10 M-5 0 h10"/></g>
    <g transform="translate(340 470) rotate(-18)"><path d="M-7 0 q2 -4 4 0 t4 0 t4 0"/></g>
    <g transform="translate(452 466) rotate(14)"><path d="M-3 -3 l6 6 M3 -3 l-6 6"/></g>
    <circle cx="28" cy="585" r="2" fill="#828282" stroke="none"/>
    <g transform="translate(115 582)"><path d="M0 -4 L1.5 0 L0 4 L-1.5 0 Z"/></g>
    <circle cx="228" cy="590" r="3.5"/>
    <circle cx="340" cy="580" r="2" fill="#828282" stroke="none"/>
    <g transform="translate(452 586) rotate(-8)"><path d="M0 -5 v10 M-5 0 h10"/></g>
    <g transform="translate(540 582) rotate(16)"><path d="M-7 0 q2 -4 4 0 t4 0 t4 0"/></g>
  </g>
</svg>
